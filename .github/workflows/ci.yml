name: CI

# Runs on every PR + every push to main. Mirrors the local pre-push hook
# and adds the integration tests that are too slow for pre-push.

on:
  pull_request:
  push:
    branches: [main]

# Cancel older in-flight CI runs for the same ref so we only ever spend
# minutes on the latest commit.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # pnpm version is sourced from package.json `packageManager` —
  # passing `version:` to pnpm/action-setup conflicts with that
  # field, so we let the action read it automatically.
  # Node 22.x — @commitlint/cli@21 requires >=22.12; matches the local
  # dev environment (Node 22.18). Bump in lockstep with any raise of
  # `engines.node` in package.json.
  NODE_VERSION: "22.x"
  # `prisma.config.ts` calls `env("DATABASE_URL")` at config-load time
  # — even `prisma generate` (which doesn't connect) needs the var to
  # be present. We supply a parseable stub at the workflow level; jobs
  # that actually run against Postgres (integration-tests) override it
  # at runtime via Testcontainers.
  DATABASE_URL: "postgresql://stub:stub@localhost:5432/stub"
  REDIS_URL: "redis://localhost:6379"
  JWT_SECRET: "stub_jwt_secret_that_is_at_least_32_chars_long"
  JWT_REFRESH_SECRET: "stub_refresh_secret_that_is_at_least_32_chars_long"
  OTP_SECRET: "stub_otp_secret_that_is_at_least_32_chars_long"

jobs:
  # ──────────────────────────────────────────────────────────
  # Fast feedback: typecheck across the workspace.
  # Same command pre-push runs locally.
  # ──────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @swasth/server prisma:generate

      - name: Typecheck
        run: pnpm -r --parallel run typecheck

  # ──────────────────────────────────────────────────────────
  # Lint: every workspace package, zero warnings. Catches gaps
  # that lint-staged (commit-time, staged files only) can miss
  # when commits are squashed or hooks are skipped.
  # ──────────────────────────────────────────────────────────
  lint:
    name: Lint (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @swasth/server prisma:generate
      - name: Lint
        run: pnpm -r --parallel run lint

  # ──────────────────────────────────────────────────────────
  # Format check (Prettier). Catches whitespace/quote/line-break
  # drift across the whole tree, not just commit-staged files.
  # ──────────────────────────────────────────────────────────
  format:
    name: Prettier format:check
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Format check
        run: pnpm format:check

  # ──────────────────────────────────────────────────────────
  # Domain-logic purity: forbidden imports + Date.now()/new Date()/
  # Math.random() at call site. Comments stripped before search.
  # Defense in depth — tsconfig path block is the primary gate.
  # ──────────────────────────────────────────────────────────
  purity:
    name: Domain-logic purity
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Purity check
        run: node scripts/check-domain-purity.mjs

  # ──────────────────────────────────────────────────────────
  # Build: every workspace package must compile to its dist/.
  # Typecheck catches type errors; build catches bundler/declaration
  # emit errors that only surface when output is actually written.
  # ──────────────────────────────────────────────────────────
  build:
    name: Build (workspace)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: pnpm --filter @swasth/server prisma:generate
      - name: Build
        run: pnpm build

  # ──────────────────────────────────────────────────────────
  # Dependency vulnerability scan. Fails on HIGH or CRITICAL CVEs
  # in the production dependency graph. Medical-grade requirement.
  # ──────────────────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Audit production deps (high+critical)
        run: pnpm audit --prod --audit-level=high

  # ──────────────────────────────────────────────────────────
  # Secret scan. Catches API keys, JWT/OTP secrets, and cloud
  # credentials accidentally committed. Full git history scanned.
  # ──────────────────────────────────────────────────────────
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 4
    # gitleaks-action queries pulls/<n>/commits to scope the diff on PRs.
    # Without pull-requests:read it 403s and the job fails on permissions,
    # not on a real leak. contents:read is required for the checkout.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ──────────────────────────────────────────────────────────
  # Domain-logic unit tests (pure functions, no Docker needed).
  # ──────────────────────────────────────────────────────────
  unit-tests:
    # NOTE: name must stay "Unit tests (domain-logic)" because branch
    # protection on main pins this exact string as a required check.
    # Renaming it leaves the required check stuck in "expected" forever
    # and blocks every merge. The job now also runs coverage — see step.
    name: Unit tests (domain-logic)
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # Run with coverage so the thresholds in vitest.config.ts are
      # enforced. Same threshold lives there as a single source of
      # truth — see the file's header comment for the ratchet plan.
      - name: Test (with coverage thresholds)
        run: pnpm --filter @swasth/domain-logic run test:coverage

  # ──────────────────────────────────────────────────────────
  # Server integration tests (Testcontainers Postgres + Redis).
  # Slower (~2 min); runs in parallel with typecheck/unit.
  # ──────────────────────────────────────────────────────────
  integration-tests:
    name: Integration tests (server)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @swasth/server prisma:generate

      - name: Integration tests
        run: pnpm test:integration

  # ──────────────────────────────────────────────────────────
  # Migration check: every diff that touches schema.prisma must
  # include at least one new migration folder under prisma/migrations.
  # Catches a common bug pattern (schema-without-migration drift).
  #
  # SHAs flow through env to avoid script injection patterns even
  # though SHAs are hex-only — defence in depth.
  # ──────────────────────────────────────────────────────────
  migration-check:
    name: Schema ↔ migration parity
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 2
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify schema changes ship with a migration
        run: |
          set -eu
          CHANGED=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          SCHEMA_TOUCHED=$(printf '%s\n' "$CHANGED" | grep -E '^apps/server/prisma/schema\.prisma$' || true)
          MIGRATION_ADDED=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^apps/server/prisma/migrations/[^/]+/migration\.sql$' || true)
          if [ -n "$SCHEMA_TOUCHED" ] && [ -z "$MIGRATION_ADDED" ]; then
            echo "::error::schema.prisma changed but no new migration folder was added."
            echo "Run: pnpm --filter @swasth/server prisma:migrate -- --name <slug>"
            exit 1
          fi
          if [ -n "$SCHEMA_TOUCHED" ]; then
            echo "Schema change pairs with new migration(s):"
            printf '%s\n' "$MIGRATION_ADDED"
          else
            echo "No schema changes — migration check skipped."
          fi

  # ──────────────────────────────────────────────────────────
  # Migration lint (squawk) — Postgres safety check on NEW migration
  # SQL only. Catches unsafe patterns that would cause prod outages:
  # adding NOT NULL columns without defaults, renaming columns, dropping
  # indexes concurrently, transaction nesting, etc.
  #
  # Only runs on PRs that introduce a new migration.sql — never lints
  # already-merged migrations (would block all PRs after a single
  # historical squawk-flagged migration).
  #
  # All untrusted inputs flow through env vars + quoted shell access
  # (no ${{ }} interpolation inside run: blocks).
  # ──────────────────────────────────────────────────────────
  migration-lint:
    name: Migration lint (squawk)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 3
    env:
      BASE_SHA: ${{ github.event.pull_request.base.sha }}
      HEAD_SHA: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new migrations
        id: detect
        run: |
          set -eu
          NEW_MIGRATIONS=$(git diff --name-only --diff-filter=A "$BASE_SHA" "$HEAD_SHA" \
            | grep -E '^apps/server/prisma/migrations/[^/]+/migration\.sql$' || true)
          if [ -z "$NEW_MIGRATIONS" ]; then
            echo "No new migrations — skipping squawk."
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            {
              echo "files<<MIGEOF"
              echo "$NEW_MIGRATIONS"
              echo "MIGEOF"
            } >> "$GITHUB_OUTPUT"
            echo "New migrations to lint:"
            printf '  %s\n' $NEW_MIGRATIONS
          fi

      - name: Install squawk
        if: steps.detect.outputs.has_new == 'true'
        run: |
          set -eu
          SQUAWK_VERSION=1.5.4
          curl -sSL -o /tmp/squawk \
            "https://github.com/sbdchd/squawk/releases/download/v${SQUAWK_VERSION}/squawk-linux-x86_64"
          chmod +x /tmp/squawk
          /tmp/squawk --version

      - name: Lint new migrations
        if: steps.detect.outputs.has_new == 'true'
        env:
          FILES: ${{ steps.detect.outputs.files }}
        run: |
          set -eu
          FAILED=0
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            # The regex in 'Detect new migrations' guarantees $f matches
            # apps/server/prisma/migrations/<name>/migration.sql — no shell
            # metacharacters can slip through to this point.
            echo "::group::squawk $f"
            if ! /tmp/squawk \
                --exclude prefer-text-field,require-concurrent-index-creation \
                "$f"; then
              FAILED=1
            fi
            echo "::endgroup::"
          done <<< "$FILES"
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::squawk flagged unsafe SQL in one or more new migrations."
            echo "Review the rules: https://squawkhq.com/docs/rules"
            exit 1
          fi

  # ──────────────────────────────────────────────────────────
  # Danger.js — three rules that turn manual reviewer checks into
  # PR comments: test-parity for domain-logic, migration-parity
  # (mirror of CI's migration-check, surfaced earlier), large-PR
  # explainer prompt. Source: dangerfile.ts at repo root.
  #
  # Requires GITHUB_TOKEN only — no third-party secrets.
  # ──────────────────────────────────────────────────────────
  danger:
    name: Danger
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    timeout-minutes: 3
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Run Danger
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm dlx danger ci --dangerfile dangerfile.ts

  # ──────────────────────────────────────────────────────────
  # Server image build + smoke. Builds the production Dockerfile, runs
  # the resulting container with the bare-minimum env, then probes
  # /health to confirm the binary actually boots. Catches: missing
  # files in COPY layers, prisma client absent, wrong entrypoint,
  # node-version mismatches.
  #
  # Does NOT run the deep healthcheck — that needs Postgres+Redis,
  # which is the integration-tests job's domain.
  # ──────────────────────────────────────────────────────────
  image-smoke:
    name: Server image build + smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          tags: swasth-server:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Boot container with stub env
        env:
          # Stub env — enough for the process to pass env-schema parse and
          # start listening. /health works without DB/Redis (only
          # /health/deep needs them). Secrets here are throwaway test
          # values, not real credentials.
          NODE_ENV: test
          DATABASE_URL: "postgresql://stub:stub@127.0.0.1:65432/stub"
          REDIS_URL: "redis://127.0.0.1:65433"
          JWT_SECRET: "ci-jwt-secret-ci-jwt-secret-ci-jwt-secret"
          JWT_REFRESH_SECRET: "ci-refresh-ci-refresh-ci-refresh-ci-refresh"
          OTP_SECRET: "ci-otp-secret-ci-otp-secret-ci-otp-secret"
          PORT: "4000"
        run: |
          set -eu
          docker run -d \
            --name swasth-server-smoke \
            -p 4000:4000 \
            -e NODE_ENV \
            -e DATABASE_URL \
            -e REDIS_URL \
            -e JWT_SECRET \
            -e JWT_REFRESH_SECRET \
            -e OTP_SECRET \
            -e PORT \
            swasth-server:ci

      - name: Probe /health
        run: |
          set -eu
          # Container needs a few seconds to boot. Poll for up to 30s.
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:4000/health > /tmp/health.json; then
              echo "OK after ${i}s:"
              cat /tmp/health.json
              exit 0
            fi
            sleep 1
          done
          echo "::error::/health did not respond within 30s"
          docker logs swasth-server-smoke || true
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f swasth-server-smoke || true
