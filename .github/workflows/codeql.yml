name: CodeQL

# GitHub-hosted SAST. Catches:
#  - SQL/command/path injection patterns
#  - Hardcoded credentials, weak crypto, unsafe deserialization
#  - Prototype pollution, ReDoS, unsafe regex
#  - Sensitive data flows into logs/responses
# Runs on PRs, on every push to main, and weekly so dormant code on main
# still gets analyzed when the rule packs ship updates.
#
# Findings appear under Security → Code scanning. Branch protection on
# main blocks merges with open ERROR-severity alerts.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 05:30 UTC (11:00 IST) — off-peak for the team.
    - cron: "30 5 * * 1"

# Each scan is independent; cancel older in-flight runs for the same ref
# so we only ever spend CodeQL minutes on the latest commit.
concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # NOTE on `continue-on-error`: CodeQL's `upload-sarif` requires
    # "Code scanning" enabled in repo Settings → Code security. On a
    # PUBLIC repo this is free; on a PRIVATE repo it requires GitHub
    # Advanced Security (paid). Without it the action fails with
    # "Code scanning is not enabled for this repository." We soft-fail
    # so the gate is informational until the repo is made public OR
    # GHAS is enabled. To upgrade to a hard gate: drop the
    # `continue-on-error` line below.
    continue-on-error: true
    permissions:
      # security-events:write is required to upload SARIF results.
      # actions:read + contents:read are required by the action.
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # CodeQL ships its own JS/TS toolchain inside the action — we
      # don't need pnpm/node here. Pure source analysis, no build step.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # `security-and-quality` includes the full security pack plus
          # maintainability queries. `security-extended` is also viable
          # but produces more noise on a young codebase — revisit when
          # the team is >=5 engineers.
          queries: security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"
