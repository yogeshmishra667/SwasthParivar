# Production docker-compose for the DigitalOcean Droplet runbook.
# See: docs/deploy-digitalocean.md
#
# This file lives on the droplet at ~/swasth/docker-compose.yml and is
# the SINGLE SOURCE OF TRUTH for what's running in prod. Secrets come
# from ~/swasth/.env (gitignored — never commit a populated copy).
#
# Differences from the dev docker-compose.yml at the repo root:
#   - Pinned image tags (no :latest) for reproducibility
#   - Named volumes pointing at host paths so DO snapshot backups
#     actually capture the data
#   - server pulled from GHCR rather than built locally
#   - Healthchecks on every service so `docker compose ps` tells the
#     truth, and so depends_on can use condition: service_healthy
#   - Restart policy is `unless-stopped` (survives reboots; doesn't
#     fight a deliberate `docker compose down`)

services:
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    container_name: swasth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: swasth
      POSTGRES_USER: swasth
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ~/swasth/data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U swasth -d swasth"]
      interval: 10s
      timeout: 3s
      retries: 5
    # Do NOT publish 5432 to the public — only the server container
    # needs it, and they share the default compose network.
    expose:
      - "5432"

  redis:
    image: redis:7-alpine
    container_name: swasth-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ~/swasth/data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    expose:
      - "6379"

  server:
    # Pinned to a SHA tag in production. Update via:
    #   docker compose pull server && docker compose up -d server
    # Bootstrap deploy may need a manual push from your laptop —
    # see docs/deploy-digitalocean.md section 7.
    image: ghcr.io/yogeshmishra667/swasth-server:latest
    container_name: swasth-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    # Bind only to localhost — nginx fronts external traffic with HTTPS.
    # Never expose 4000 to the public internet directly.
    ports:
      - "127.0.0.1:4000:4000"
    healthcheck:
      # Same check the Dockerfile baked in, repeated here so
      # `docker compose ps` shows the status.
      test:
        - "CMD"
        - "node"
        - "-e"
        - "require('node:http').get('http://127.0.0.1:'+process.env.PORT+'/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
